# Sabiowl Home Pages — Jekyll 設定
# GitHub Pages のデフォルトテーマ minima を使用、日本語対応。
# 旧 sabiowl-legal-pages を sabiowl-home-pages に統合 (2026-06-14、BUG-121)。
# 法的文書 + リリースノート + 将来 FAQ 等を集約する公式情報ホーム。

title: Sabiowl
description: Sabiowl 公式情報サイト（リリースノート・プライバシーポリシー・利用規約）
lang: ja
url: https://subaru7105.github.io
baseurl: /sabiowl-home-pages

# テーマ（GitHub Pages サポート）
theme: minima

# 著作権 & 連絡先（minima テーマの footer に表示される）
# author を文字列で渡すと minima が name として扱い、email をトップレベルに置くと
# footer に正しく表示される（Hash で渡すと {"name"=>...} 形式の Ruby inspect になる）
author: Sabiowl
email: support@sabiowl.com

# Jekyll プラグイン（GitHub Pages サポート範囲のみ）
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# minima 設定
# 【2026-06-27】公式 X (旧 Twitter) アカウント @sabiowlapp を social_links に追加。
# minima テーマの footer に SNS リンクが自動表示される。GitHub Pages の minima
# 2.5 系では `twitter:` キーで自動的に twitter.com/<handle> へのリンクとなるが、
# 現状 X.com 側で twitter.com → x.com 自動リダイレクトされるため実用上問題なし。
# 念のため index.md の「関連リンク」セクションにも明示的に X URL を追記済 (二重露出)。
minima:
  social_links:
    twitter: sabiowlapp
  skin: classic

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# 除外
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .gitignore
